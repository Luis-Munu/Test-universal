<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test Master</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2064%2064%22%3E%0A%20%20%3Cdefs%3E%0A%20%20%20%20%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%221%22%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%220%22%20stop-color%3D%22%236f8fe8%22%2F%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%221%22%20stop-color%3D%22%238fd7c8%22%2F%3E%0A%20%20%20%20%3C%2FlinearGradient%3E%0A%20%20%3C%2Fdefs%3E%0A%20%20%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2216%22%20fill%3D%22url%28%23g%29%22%2F%3E%0A%20%20%3Cpath%20d%3D%22M19%2016h29v8H32.5l9.6%208-9.6%208H49v8H19v-7.2L29.4%2032%2019%2023.2z%22%20fill%3D%22%23fff%22%2F%3E%0A%20%20%3Ccircle%20cx%3D%2249%22%20cy%3D%2217%22%20r%3D%225%22%20fill%3D%22%23fff%22%20opacity%3D%22.78%22%2F%3E%0A%3C%2Fsvg%3E">
  <meta name="theme-color" content="#6f8fe8">
  <style>
:root {
  --bg-1: #f5f8ff;
  --bg-2: #edf5ff;
  --bg-3: #f9fbff;
  --surface: rgba(255, 255, 255, 0.72);
  --surface-strong: rgba(255, 255, 255, 0.88);
  --surface-soft: rgba(247, 250, 255, 0.9);
  --line: rgba(116, 146, 188, 0.22);
  --line-strong: rgba(110, 139, 180, 0.34);
  --text: #18324f;
  --text-soft: #667b96;
  --accent: #6f8fe8;
  --accent-strong: #5677d8;
  --accent-soft: #eef3ff;
  --mint: #8fd7c8;
  --mint-soft: #e8fbf5;
  --lavender: #cab8ff;
  --danger: #d96a7a;
  --danger-soft: #fff0f3;
  --success: #35a873;
  --success-soft: #ecfff5;
  --shadow-xl: 0 32px 80px rgba(92, 115, 145, 0.22);
  --shadow-md: 0 14px 34px rgba(101, 123, 160, 0.14);
  --radius-xl: 32px;
  --radius-lg: 24px;
  --radius-md: 18px;
}
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 12% 18%, rgba(202, 184, 255, 0.42), transparent 28%),
    radial-gradient(circle at 88% 18%, rgba(143, 215, 200, 0.34), transparent 24%),
    radial-gradient(circle at 18% 90%, rgba(163, 196, 255, 0.25), transparent 26%),
    linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
  overflow-x: hidden;
  overflow-y: auto;
}
body::before,
body::after {
  content: "";
  position: fixed;
  inset: auto;
  pointer-events: none;
  filter: blur(80px);
  opacity: 0.55;
}
body::before {
  width: 260px;
  height: 260px;
  top: 6%;
  right: 7%;
  border-radius: 50%;
  background: rgba(111, 143, 232, 0.25);
}
body::after {
  width: 260px;
  height: 260px;
  left: 5%;
  bottom: 5%;
  border-radius: 50%;
  background: rgba(143, 215, 200, 0.2);
}
button { font: inherit; }
.app-shell {
  min-height: 100dvh;
  padding: clamp(16px, 3vw, 30px);
  display: grid;
  justify-items: center;
  /* "safe" keeps the card top-aligned (and fully scrollable) when it grows
     taller than the viewport, while still centering normal-height cards. */
  align-items: safe center;
}
.view {
  width: min(980px, 100%);
  display: grid;
  place-items: center;
  animation: fadeUp 0.46s cubic-bezier(.2,.8,.2,1);
}
.frame {
  width: 100%;
  /* No hard height cap: the card grows to fit long questions/answers and the
     page scrolls. min-height keeps the usual tall, filled look for normal text. */
  max-height: none;
  min-height: min(760px, calc(100dvh - 34px));
  padding: clamp(18px, 2.4vw, 28px);
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.85);
  backdrop-filter: blur(22px) saturate(150%);
  -webkit-backdrop-filter: blur(22px) saturate(150%);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-xl);
  display: grid;
  gap: clamp(12px, 1.8vh, 18px);
  overflow: visible;
  position: relative;
}
.frame::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0.04));
  pointer-events: none;
}
.frame > * { position: relative; z-index: 1; }
.quiz-frame {
  /* Content-based minimums (min-content) let the question and answers rows grow
     to show all text; the fr maximums still fill the card for normal-length text. */
  grid-template-rows: minmax(min-content, 0.9fr) minmax(min-content, 1.52fr) auto auto auto auto;
}
.question-card {
  min-height: clamp(132px, 18vh, 220px);
  max-height: none;
  padding: clamp(20px, 3vh, 30px);
  padding-right: clamp(52px, 5vw, 68px);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  border-radius: 28px;
  background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(247,250,255,0.88));
  border: 1px solid rgba(130, 156, 196, 0.2);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), var(--shadow-md);
  font-size: clamp(1.24rem, 2.18vw, 1.9rem);
  font-weight: 760;
  line-height: 1.28;
  overflow: visible;
  position: relative;
}
.question-text {
  display: block;
  width: 100%;
  max-height: none;
  overflow: visible;
  padding-inline: clamp(10px, 2vw, 24px);
}
.question-card.q-long {
  font-size: clamp(1.03rem, 1.62vw, 1.46rem);
  line-height: 1.24;
  padding-top: clamp(16px, 2.2vh, 24px);
  padding-bottom: clamp(16px, 2.2vh, 24px);
}
.question-card.q-very-long {
  font-size: clamp(0.92rem, 1.32vw, 1.17rem);
  line-height: 1.2;
  padding-top: clamp(13px, 1.8vh, 18px);
  padding-bottom: clamp(13px, 1.8vh, 18px);
}
.question-card.q-very-long .question-text {
  padding-inline: clamp(4px, 1.2vw, 14px);
}
.source-badge {
  position: absolute;
  top: clamp(12px, 1.7vh, 16px);
  right: clamp(12px, 1.7vh, 16px);
  width: 28px;
  height: 28px;
  border-radius: 999px;
  display: grid;
  place-items: center;
  background: rgba(237, 242, 255, 0.92);
  border: 1px solid rgba(111, 143, 232, 0.24);
  color: var(--accent-strong);
  font-size: 0.84rem;
  font-weight: 850;
  cursor: help;
  z-index: 5;
  box-shadow: 0 8px 18px rgba(100, 124, 170, 0.12);
  outline: none;
}
.source-badge:focus {
  box-shadow: 0 0 0 4px rgba(111, 143, 232, 0.15), 0 8px 18px rgba(100, 124, 170, 0.12);
}
.source-tooltip {
  position: absolute;
  top: 36px;
  right: 0;
  width: max-content;
  max-width: min(360px, 72vw);
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(24, 50, 79, 0.96);
  color: #fff;
  font-size: 0.77rem;
  font-weight: 650;
  line-height: 1.32;
  text-align: left;
  box-shadow: 0 18px 40px rgba(24, 50, 79, 0.18);
  opacity: 0;
  transform: translateY(-4px) scale(0.98);
  pointer-events: none;
  transition: opacity 0.18s ease, transform 0.18s ease;
}
.source-tooltip::before {
  content: "";
  position: absolute;
  top: -6px;
  right: 10px;
  width: 12px;
  height: 12px;
  background: rgba(24, 50, 79, 0.96);
  transform: rotate(45deg);
}
.source-badge:hover .source-tooltip,
.source-badge:focus .source-tooltip,
.source-badge:focus-within .source-tooltip {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.question-card.ready-next {
  cursor: pointer;
  outline: 2px solid rgba(111, 143, 232, 0.22);
  animation: pulseSoft 1.7s ease-in-out infinite;
}
.answers {
  min-height: 0;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  /* Rows grow to fit the tallest answer (min-content) and otherwise share space
     evenly (1fr). Both answers in a row stretch to equal height. */
  grid-auto-rows: minmax(min-content, 1fr);
  gap: clamp(10px, 1.5vh, 14px);
}
/* A lone third option spans the full width so the layout stays balanced. */
.answers[data-count="3"] .answer:nth-child(3) { grid-column: 1 / -1; }
/* Two options sit side by side; single-option edge case fills the row. */
.answers[data-count="1"] { grid-template-columns: 1fr; }
.answer {
  min-width: 0;
  min-height: 84px;
  border: 1px solid rgba(124, 152, 192, 0.18);
  border-radius: 24px;
  background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(245,248,255,0.92));
  color: var(--text);
  overflow: hidden;
  text-align: left;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(117, 136, 171, 0.1);
  transition: transform 0.24s cubic-bezier(.2,.8,.2,1), box-shadow 0.24s ease, border-color 0.24s ease, background 0.24s ease, opacity 0.24s ease;
}
.answer:hover {
  transform: translateY(-3px);
  border-color: rgba(111, 143, 232, 0.42);
  box-shadow: 0 20px 34px rgba(115, 132, 168, 0.16);
}
.answer:active { transform: translateY(-1px) scale(0.995); }
.answer-inner {
  height: 100%;
  display: grid;
  grid-template-columns: 48px minmax(0, 1fr);
  gap: 14px;
  align-items: center;
  padding: clamp(14px, 1.9vh, 18px);
}
.answer-key {
  width: 40px;
  height: 40px;
  border-radius: 14px;
  display: grid;
  place-items: center;
  background: linear-gradient(180deg, #edf2ff, #e7efff);
  color: var(--accent-strong);
  font-weight: 800;
  font-size: 1rem;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
}
.answer-text {
  max-height: none;
  overflow: visible;
  font-size: clamp(0.97rem, 1.35vw, 1.06rem);
  line-height: 1.36;
  padding-right: 4px;
}
.answer.correct {
  background: linear-gradient(180deg, rgba(236,255,245,0.97), rgba(229,252,241,0.92));
  border-color: rgba(53,168,115,0.42);
}
.answer.correct .answer-key {
  background: linear-gradient(180deg, rgba(53,168,115,0.96), rgba(40,149,101,0.96));
  color: #fff;
}
.answer.wrong {
  background: linear-gradient(180deg, rgba(255,240,243,0.98), rgba(255,233,238,0.94));
  border-color: rgba(217,106,122,0.42);
}
.answer.wrong .answer-key {
  background: linear-gradient(180deg, rgba(217,106,122,0.96), rgba(198,89,105,0.96));
  color: #fff;
}
.answer.dim { opacity: 0.62; }
.feedback-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
}
.feedback {
  min-height: 54px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  border-radius: 18px;
  padding: 14px 18px;
  background: rgba(255,255,255,0.62);
  border: 1px solid rgba(124, 152, 192, 0.14);
  color: var(--text-soft);
  font-size: 0.97rem;
  line-height: 1.35;
}
.feedback.is-correct {
  color: #1e7c56;
  background: rgba(236,255,245,0.88);
  border-color: rgba(53,168,115,0.22);
}
.feedback.is-wrong {
  color: #b24b5c;
  background: rgba(255,240,243,0.9);
  border-color: rgba(217,106,122,0.24);
}
.feedback.result-feedback {
  animation: fadeUp 0.24s cubic-bezier(.2,.8,.2,1);
  font-weight: 650;
}
.progress-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}
.stat-chip {
  min-width: 116px;
  padding: 11px 14px;
  background: rgba(255,255,255,0.68);
  border: 1px solid rgba(125, 150, 189, 0.14);
  border-radius: 18px;
  display: grid;
  gap: 4px;
  text-align: center;
  box-shadow: 0 8px 18px rgba(125, 143, 177, 0.08);
}
.stat-label {
  color: var(--text-soft);
  font-size: 0.77rem;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.stat-value {
  color: var(--text);
  font-size: 1.03rem;
  font-weight: 780;
}
.actions-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}
.selector-stack {
  display: grid;
  gap: 10px;
}
.subject-switch-label {
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--muted, #6b7280);
  text-align: center;
  margin-bottom: 2px;
}
.subject-switch {
  display: flex;
  gap: 6px;
  padding: 6px;
  border-radius: 999px;
  background: rgba(237, 242, 255, 0.7);
  border: 1px solid var(--line);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
  overflow-x: auto;
  scrollbar-width: none;
}
.subject-switch::-webkit-scrollbar { display: none; }
.subject-chip {
  flex: 1 1 auto;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  white-space: nowrap;
  padding: 10px 16px;
  border: 0;
  border-radius: 999px;
  background: transparent;
  color: var(--text-soft);
  font-weight: 760;
  font-size: 0.95rem;
  cursor: pointer;
  transition: background 0.26s cubic-bezier(.2,.8,.2,1), color 0.22s ease, box-shadow 0.22s ease, transform 0.18s ease;
}
.subject-chip:hover { color: var(--text); transform: translateY(-1px); }
.subject-chip.active {
  background: linear-gradient(180deg, #ffffff, #f4f8ff);
  color: var(--accent-strong);
  box-shadow: 0 10px 22px rgba(95, 126, 223, 0.18), inset 0 0 0 1px rgba(111, 143, 232, 0.18);
}
.subject-emoji { font-size: 1.06rem; line-height: 1; }
.mode-selector {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 10px;
}
.btn,
.mode-btn {
  border: 0;
  border-radius: 999px;
  cursor: pointer;
  transition: transform 0.22s cubic-bezier(.2,.8,.2,1), box-shadow 0.22s ease, background 0.22s ease, color 0.22s ease, opacity 0.22s ease;
}
.btn:hover,
.mode-btn:hover { transform: translateY(-2px); }
.btn:active,
.mode-btn:active { transform: translateY(0); }
.btn {
  padding: 12px 18px;
  font-weight: 720;
}
.btn-primary {
  background: linear-gradient(180deg, #6f8fe8, #5c7fdf);
  color: #fff;
  box-shadow: 0 14px 28px rgba(95, 126, 223, 0.28);
}
.btn-primary:disabled {
  opacity: 0.45;
  box-shadow: none;
  cursor: not-allowed;
}
.btn-soft {
  background: rgba(255,255,255,0.92);
  color: var(--text);
  box-shadow: 0 10px 24px rgba(125, 143, 177, 0.12);
}
.btn-ghost {
  background: rgba(239,244,255,0.92);
  color: var(--accent-strong);
}
.btn-tertiary {
  background: transparent;
  color: var(--text-soft);
  border: 1px solid rgba(124, 152, 192, 0.24);
}
.mode-btn {
  padding: 13px 14px;
  background: rgba(255,255,255,0.6);
  color: var(--text);
  font-weight: 740;
  border: 1px solid rgba(124, 152, 192, 0.16);
}
.mode-btn.active {
  background: linear-gradient(180deg, rgba(111,143,232,0.98), rgba(92,127,223,0.98));
  color: #fff;
  box-shadow: 0 14px 28px rgba(95, 126, 223, 0.26);
}
.tiny-note {
  text-align: center;
  color: var(--text-soft);
  font-size: 0.84rem;
}
.result-frame {
  grid-template-rows: auto auto auto auto minmax(0, 1fr);
}
.result-hero {
  display: grid;
  gap: 8px;
  justify-items: center;
  text-align: center;
}
.result-kicker {
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.68);
  color: var(--text-soft);
  font-size: 0.82rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.result-score {
  display: flex;
  align-items: baseline;
  gap: 8px;
  color: var(--text);
}
.result-score strong {
  font-size: clamp(3rem, 7vw, 4.8rem);
  line-height: 1;
}
.result-score span {
  font-size: clamp(1.2rem, 2vw, 1.6rem);
  color: var(--text-soft);
  font-weight: 700;
}
.result-subtitle {
  margin: 0;
  color: var(--text-soft);
}
.review-block {
  min-height: 0;
  overflow: auto;
  background: rgba(255,255,255,0.52);
  border: 1px solid rgba(124, 152, 192, 0.12);
  border-radius: 24px;
  padding: 18px;
}
.review-block h2 {
  margin: 0 0 12px;
  text-align: center;
  font-size: 1rem;
  color: var(--text-soft);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.miss {
  background: rgba(255,255,255,0.88);
  border: 1px solid rgba(124, 152, 192, 0.12);
  border-radius: 20px;
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: 0 10px 20px rgba(125, 143, 177, 0.08);
}
.miss p {
  margin: 0 0 8px;
  line-height: 1.36;
  font-weight: 650;
}
.miss small {
  display: block;
  line-height: 1.4;
  color: var(--text-soft);
}
.error-card {
  max-width: 920px;
  max-height: calc(100dvh - 36px);
  overflow: auto;
  background: rgba(255,255,255,0.82);
}
.error-card h1 {
  margin: 0;
  text-align: center;
}
.error-card pre {
  white-space: pre-wrap;
  word-break: break-word;
  background: rgba(245,248,255,0.95);
  border-radius: 18px;
  border: 1px solid rgba(124, 152, 192, 0.14);
  padding: 14px;
  color: var(--text-soft);
  overflow: auto;
}
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: rgba(120, 146, 190, 0.32);
  border-radius: 999px;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px) scale(0.985); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes pulseSoft {
  0%, 100% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 0 0 0 rgba(111,143,232,0.1); }
  50% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 0 0 8px rgba(111,143,232,0); }
}
@media (max-height: 800px) and (min-width: 901px) {
  .frame { max-height: calc(100dvh - 24px); min-height: auto; padding: 16px; }
  .quiz-frame { grid-template-rows: minmax(min-content, 0.76fr) minmax(min-content, 1.3fr) auto auto auto auto; }
  .question-card { min-height: 120px; }
  .answer-inner { padding: 12px 14px; gap: 12px; }
  .stat-chip { padding: 10px 13px; }
  .btn, .mode-btn { padding-top: 11px; padding-bottom: 11px; }
}
@media (max-width: 900px) {
  body { overflow: auto; }
  .app-shell { min-height: 100dvh; padding: 14px; }
  .frame { max-height: none; min-height: auto; }
  .quiz-frame, .result-frame { grid-template-rows: auto auto auto auto auto auto; }
  .answers { grid-template-columns: 1fr; grid-template-rows: none; }
  .answer { min-height: 110px; }
  .mode-selector { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 560px) {
  .mode-selector { grid-template-columns: 1fr; }
  .actions-row { flex-direction: column; }
  .btn, .mode-btn { width: 100%; }
  .progress-row { display: grid; grid-template-columns: 1fr 1fr; }
  /* En móvil, una asignatura debajo de otra para tocarlas más fácil */
  .subject-switch { flex-direction: column; overflow-x: visible; border-radius: 18px; }
  .subject-chip { justify-content: flex-start; width: 100%; padding: 13px 16px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
}

.settings-trigger {
  position: fixed;
  top: clamp(14px, 2.1vw, 24px);
  right: clamp(14px, 2.1vw, 24px);
  z-index: 15;
  width: 44px;
  height: 44px;
  border: 1px solid rgba(255,255,255,0.82);
  border-radius: 16px;
  display: grid;
  place-items: center;
  background: rgba(255,255,255,0.7);
  color: var(--accent-strong);
  box-shadow: 0 14px 34px rgba(101, 123, 160, 0.16);
  backdrop-filter: blur(18px) saturate(150%);
  -webkit-backdrop-filter: blur(18px) saturate(150%);

  </style>
</head>
<body>
  <div id="app" class="app-shell"></div>
  <script>

  "use strict";

  const BANK_OVERRIDE = new URLSearchParams(window.location.search).get("bank");
  let BANK_URL = BANK_OVERRIDE || "questions.json";
  const SUBJECTS_URL = "subjects.json";
  const LETTERS = ["A", "B", "C", "D", "E", "F", "G", "H"];
  const STORE_KEYS = {
    settings: "quizTrainerSettingsV2",
    legacySettings: "quizTrainerSettings",
    lastSubject: "quizTrainerLastSubject",
    best: "quizTrainerBestScoresV2",
    legacyBest: "matematicasQuizBestScores"
  };
  let SUBJECTS = [];
  let CURRENT_SUBJECT = null;
  const FALLBACK_MODES = [
    { key: "general", label: "General", tema: null },
    { key: "tema1", label: "Tema 1", tema: 1 },
    { key: "tema2", label: "Tema 2", tema: 2 },
    { key: "tema3", label: "Tema 3", tema: 3 }
  ];
  const DEFAULT_SETTINGS = { questionCount: 40, penaltyEvery: 3 };
  const SETTING_LIMITS = {
    questionCount: { min: 1, max: 9999 },
    penaltyEvery: { min: 1, max: 10 }
  };

  let DATA_META = { total: 0, trusted: 0, untrusted: 0, trustedByTema: {}, allByTema: {} };
  let QUESTIONS = [];
  let APP_TITLE = "Test";
  let MODES = FALLBACK_MODES.slice();
  let MODE_LABELS = Object.fromEntries(MODES.map(mode => [mode.key, mode.label]));
  let MODE_TEMA = Object.fromEntries(MODES.filter(mode => mode.tema != null).map(mode => [mode.key, mode.tema]));
  let SOURCE_NAMES = [];

  const storage = (() => {
    try {
      const key = "__quiz_storage_test__";
      localStorage.setItem(key, "1");
      localStorage.removeItem(key);
      return localStorage;
    } catch (_) {
      return null;
    }
  })();

  const state = {
    selectedMode: "general",
    currentTest: [],
    currentIndex: 0,
    answered: false,
    selectedKey: null,
    score: 0,
    correct: 0,
    wrong: 0,
    answers: [],
    startedAt: 0,
    elapsed: 0,
    timer: null,
    bestScores: loadBestScores(),
    cycleUsed: {},
    error: null,
    finished: false,
    loading: true,
    settingsOpen: false,
    settings: defaultSettings()
  };

  function clampNumber(value, min, max, fallback) {
    const parsed = Number.parseInt(value, 10);
    if (!Number.isFinite(parsed)) return fallback;
    return Math.min(max, Math.max(min, parsed));
  }

  function normalizedQuestionCount() {
    return clampNumber(state.settings.questionCount, SETTING_LIMITS.questionCount.min, SETTING_LIMITS.questionCount.max, DEFAULT_SETTINGS.questionCount);
  }

  function normalizedPenaltyEvery() {
    return clampNumber(state.settings.penaltyEvery, SETTING_LIMITS.penaltyEvery.min, SETTING_LIMITS.penaltyEvery.max, DEFAULT_SETTINGS.penaltyEvery);
  }

  // How many usable (trusted, de-duplicated) questions exist for a given mode.
  function poolSizeForMode(mode) {
    return poolForMode(mode).length;
  }

  // True when the user wants ALL available questions for the current pool —
  // either explicitly (MAX) or because the saved number meets/exceeds the pool.
  function isMaxActive(mode = state.selectedMode) {
    if (state.settings.useMax === true) return true;
    const pool = poolSizeForMode(mode);
    return pool > 0 && normalizedQuestionCount() >= pool;
  }

  // The real test size: capped to what the pool can offer, or the whole pool
  // when MAX is active. Adapts automatically when the mode/subject changes.
  function effectiveQuestionCount(mode = state.selectedMode) {
    const pool = poolSizeForMode(mode);
    if (pool <= 0) return 0;
    if (isMaxActive(mode)) return pool;
    return Math.min(normalizedQuestionCount(), pool);
  }

  // What the stepper shows: a number, or "MAX" when all questions are used.
  function questionCountDisplay() {
    return isMaxActive() ? "MAX" : String(effectiveQuestionCount());
  }

  function currentTestSize() {
    return state.currentTest.length || effectiveQuestionCount();
  }

  function readJSON(key, fallback) {
    if (!storage) return fallback;
    try {
      const raw = storage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (_) {
      return fallback;
    }
  }

  function defaultSettings() {
    return {
      questionCount: DEFAULT_SETTINGS.questionCount,
      penaltyEvery: DEFAULT_SETTINGS.penaltyEvery,
      useMax: false,
      enabledSources: null,
      selectedMode: "general"
    };
  }

  // A question is usable as long as its declared correctKey resolves to one of
  // its own options and there are at least two options. Option count is NOT
  // forced to four, so 3-option (or other) questions load fine.
  function correctKeyValid(q) {
    return Array.isArray(q.options) && q.options.length >= 2 && q.options.some(o => o && o.key === q.correctKey);
  }

  function allSettings() {
    const raw = readJSON(STORE_KEYS.settings, null);
    return (raw && typeof raw === "object") ? raw : {};
  }

  function hasSavedSettings(subjectKey) {
    const all = allSettings();
    return !!(all && all[subjectKey]);
  }

  function loadSettings(subjectKey) {
    const saved = allSettings()[subjectKey] || {};
    return {
      questionCount: clampNumber(saved.questionCount, SETTING_LIMITS.questionCount.min, SETTING_LIMITS.questionCount.max, DEFAULT_SETTINGS.questionCount),
      penaltyEvery: clampNumber(saved.penaltyEvery, SETTING_LIMITS.penaltyEvery.min, SETTING_LIMITS.penaltyEvery.max, DEFAULT_SETTINGS.penaltyEvery),
      useMax: saved.useMax === true,
      enabledSources: Array.isArray(saved.enabledSources) ? saved.enabledSources.slice() : null,
      selectedMode: typeof saved.selectedMode === "string" ? saved.selectedMode : "general"
    };
  }

  function saveSettings() {
    if (!storage || !CURRENT_SUBJECT) return;
    try {
      const all = allSettings();
      all[CURRENT_SUBJECT] = {
        questionCount: normalizedQuestionCount(),
        penaltyEvery: normalizedPenaltyEvery(),
        useMax: state.settings.useMax === true,
        enabledSources: Array.isArray(state.settings.enabledSources) ? state.settings.enabledSources.slice() : null,
        selectedMode: state.selectedMode
      };
      storage.setItem(STORE_KEYS.settings, JSON.stringify(all));
    } catch (_) {}
  }

  // One-time migration from the previous single-subject storage layout.
  function migrateLegacy(defaultSubjectKey) {
    if (!storage) return;
    try {
      if (!storage.getItem(STORE_KEYS.settings)) {
        const legacy = readJSON(STORE_KEYS.legacySettings, null);
        if (legacy && typeof legacy === "object") {
          const map = {};
          map[defaultSubjectKey] = {
            questionCount: legacy.questionCount,
            penaltyEvery: legacy.penaltyEvery,
            enabledSources: Array.isArray(legacy.enabledSources) ? legacy.enabledSources : null,
            selectedMode: "general"
          };
          storage.setItem(STORE_KEYS.settings, JSON.stringify(map));
        }
      }
      if (!storage.getItem(STORE_KEYS.best)) {
        const legacyBest = readJSON(STORE_KEYS.legacyBest, null);
        if (legacyBest && typeof legacyBest === "object") {
          const map = {};
          map[defaultSubjectKey] = legacyBest;
          storage.setItem(STORE_KEYS.best, JSON.stringify(map));
        }
      }
    } catch (_) {}
  }

  function applyBank(bank) {
    const title = bank.title || bank.questionBankName || "Test";
    APP_TITLE = title;
    document.title = title;
    MODES = Array.isArray(bank.modes) && bank.modes.length ? bank.modes : FALLBACK_MODES.slice();
    MODE_LABELS = Object.fromEntries(MODES.map(mode => [mode.key, mode.label]));
    MODE_TEMA = Object.fromEntries(MODES.filter(mode => mode.tema != null).map(mode => [mode.key, mode.tema]));
    QUESTIONS = Array.isArray(bank.questions) ? bank.questions : [];
    SOURCE_NAMES = Array.from(new Set(QUESTIONS.map(questionSourceName).filter(Boolean)))
      .sort((a, b) => a.localeCompare(b, "es", { sensitivity: "base" }));
    if (Array.isArray(state.settings.enabledSources)) {
      const previousEnabledSources = state.settings.enabledSources.slice();
      state.settings.enabledSources = state.settings.enabledSources.filter(source => SOURCE_NAMES.includes(source));
      if (previousEnabledSources.length > 0 && state.settings.enabledSources.length === 0) {
        state.settings.enabledSources = SOURCE_NAMES.slice();
      }
    } else {
      state.settings.enabledSources = SOURCE_NAMES.slice();
    }
    DATA_META = bank.meta || {};
    DATA_META.total = QUESTIONS.length;
    DATA_META.trusted = QUESTIONS.filter(q => q.trusted === true).length;
    DATA_META.untrusted = QUESTIONS.length - DATA_META.trusted;
    state.cycleUsed = Object.fromEntries(MODES.map(mode => [mode.key, new Set()]));
    if (!MODE_LABELS[state.selectedMode]) state.selectedMode = MODES[0]?.key || "general";
  }

  async function fetchJSON(url) {
    const response = await fetch(url, { cache: "no-store" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return response.json();
  }

  function normalizeSubjects(list) {
    return (Array.isArray(list) ? list : [])
      .filter(s => s && typeof s.key === "string" && typeof s.bank === "string")
      .map(s => ({ key: s.key, label: s.label || s.key, icon: s.icon || "", bank: s.bank }));
  }

  // Everything lives in one human-friendly file (questions.json). Its layers are
  // subjects -> temas -> questions, where each question is simply
  // { question, options:[...strings], correct, tema? }. We normalize that easy
  // authoring format into the internal shape the rest of the app uses.
  const DATA_FILE = BANK_OVERRIDE || "questions.json";
  let DATA = null;

  // Resolve the "correct" field, which may be a letter (A), a 1-based number (1),
  // a 0-based index, or the exact option text. Returns the matching option key.
  function resolveCorrect(value, options) {
    if (value == null) return null;
    if (typeof value === "number" && Number.isFinite(value)) {
      if (options[value - 1]) return options[value - 1].key; // 1-based (natural)
      if (options[value]) return options[value].key;          // 0-based fallback
      return null;
    }
    const s = String(value).trim();
    const norm = t => String(t).trim().toLowerCase();
    const byKey = options.find(o => o.key.toLowerCase() === s.toLowerCase());
    if (byKey) return byKey.key;
    const byText = options.find(o => norm(o.text) === norm(s));
    if (byText) return byText.key;
    if (/^\d+$/.test(s)) return resolveCorrect(parseInt(s, 10), options);
    return null;
  }

  // Normalize one authored question. Accepts options as plain strings or as
  // {key,text} objects. Returns null for anything too broken to use.
  function normalizeAuthoredQuestion(q, subjectKey, i) {
    if (!q || !q.question) return null;
    const rawOpts = Array.isArray(q.options) ? q.options : [];
    const options = rawOpts.map((o, k) => {
      const text = (o && typeof o === "object") ? String(o.text != null ? o.text : "") : String(o);
      const key = (o && typeof o === "object" && o.key != null) ? String(o.key) : (LETTERS[k] || String(k + 1));
      return { key, text: text.trim() };
    }).filter(o => o.text !== "");
    if (options.length < 2) return null;
    const correctKey = resolveCorrect(q.correct != null ? q.correct : q.correctKey, options);
    if (correctKey == null) return null;
    return {
      id: q.id || (subjectKey + "-" + (i + 1)),
      tema: (q.tema != null && q.tema !== "") ? String(q.tema) : null,
      question: String(q.question),
      options,
      correctKey,
      trusted: q.trusted !== false,
      sourceRef: q.source || q.sourceRef || ""
    };
  }

  // Turn a subject entry into the internal bank object applyBank() expects.
  function normalizeBank(subject) {
    const temas = Array.isArray(subject.temas) ? subject.temas : [];
    const modes = [{ key: "general", label: "General", tema: null }].concat(
      temas.map(t => {
        const label = (t && typeof t === "object") ? String(t.label || t.key) : String(t);
        const key = (t && typeof t === "object" && t.key != null) ? String(t.key) : label;
        return { key, label, tema: key };
      })
    );
    const questions = (Array.isArray(subject.questions) ? subject.questions : [])
      .map((q, i) => normalizeAuthoredQuestion(q, subject.key, i))
      .filter(Boolean);
    return {
      title: subject.label || subject.key,
      questionBankName: subject.label || subject.key,
      defaultSettings: subject.defaultSettings || (DATA && DATA.defaultSettings) || DEFAULT_SETTINGS,
      modes,
      meta: subject.meta || {},
      questions
    };
  }

  async function getBank(subject) {
    const entry = (DATA && Array.isArray(DATA.subjects)) ? DATA.subjects.find(s => s.key === subject.key) : null;
    if (!entry) throw new Error("Asignatura no encontrada: " + subject.key);
    return normalizeBank(entry);
  }

  // Load the single data file and list its subjects.
  async function loadSubjects() {
    DATA = await fetchJSON(DATA_FILE);
    if (DATA && DATA.appTitle) document.title = DATA.appTitle;
    const subs = normalizeSubjects((DATA.subjects || []).map(s => ({ key: s.key, label: s.label, icon: s.icon, bank: DATA_FILE })));
    if (!subs.length) throw new Error("El archivo no contiene asignaturas.");
    return subs;
  }

  function subjectByKey(key) {
    return SUBJECTS.find(s => s.key === key) || SUBJECTS[0];
  }

  function resolveInitialSubject() {
    const last = storage ? storage.getItem(STORE_KEYS.lastSubject) : null;
    if (last && SUBJECTS.some(s => s.key === last)) return last;
    return SUBJECTS[0].key;
  }

  async function activateSubject(subjectKey) {
    const subject = subjectByKey(subjectKey);
    CURRENT_SUBJECT = subject.key;
    BANK_URL = subject.bank;
    if (storage) {
      try { storage.setItem(STORE_KEYS.lastSubject, subject.key); } catch (_) {}
    }
    const seeded = hasSavedSettings(subject.key);
    state.settings = loadSettings(subject.key);
    state.selectedMode = state.settings.selectedMode || "general";
    state.loading = true;
    state.error = null;
    stopTimer();
    render();
    try {
      const bank = await getBank(subject);
      // First time we open a subject, seed its defaults from the bank file.
      if (!seeded && bank.defaultSettings) {
        state.settings.questionCount = clampNumber(bank.defaultSettings.questionCount, SETTING_LIMITS.questionCount.min, SETTING_LIMITS.questionCount.max, DEFAULT_SETTINGS.questionCount);
        state.settings.penaltyEvery = clampNumber(bank.defaultSettings.penaltyEvery, SETTING_LIMITS.penaltyEvery.min, SETTING_LIMITS.penaltyEvery.max, DEFAULT_SETTINGS.penaltyEvery);
      }
      applyBank(bank);
      saveSettings();
      const validation = validateData();
      state.loading = false;
      if (!validation.ok) {
        state.error = validation.problems.join("\n");
        render();
        return;
      }
      startNewTest(state.selectedMode);
    } catch (error) {
      stopTimer();
      state.loading = false;
      state.error = `No se ha podido cargar "${subject.label}" (${subject.bank}). Sube index.html y los archivos .json a la misma carpeta de GitHub Pages. Detalle: ${error.message}`;
      render();
    }
  }

  function switchSubject(subjectKey) {
    if (!subjectKey || subjectKey === CURRENT_SUBJECT) return;
    saveSettings();
    activateSubject(subjectKey);
  }

  async function init() {
    try {
      SUBJECTS = await loadSubjects();
    } catch (error) {
      state.loading = false;
      state.error = `No se ha podido cargar ${DATA_FILE}. En tu ordenador ábrelo con un servidor local (p. ej. "python -m http.server") o súbelo a GitHub Pages. Detalle: ${error.message}`;
      render();
      return;
    }
    const defaultSubject = SUBJECTS.find(s => s.key === "matematicas") || SUBJECTS[0];
    migrateLegacy(defaultSubject.key);
    state.bestScores = loadBestScores();
    await activateSubject(resolveInitialSubject());
  }

  function normalizeQuestion(text) {
    return String(text || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[̀-ͯ]/g, "")
      .replace(/[^a-z0-9ñ]+/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function questionUniqueKey(q) {
    return q.duplicateGroup || normalizeQuestion(q.question);
  }

  function uniqueByQuestionText(questions) {
    const seen = new Set();
    const result = [];
    for (const q of questions) {
      const n = questionUniqueKey(q);
      if (!n || seen.has(n)) continue;
      seen.add(n);
      result.push(q);
    }
    return result;
  }

  function questionSourceName(q) {
    const raw = String(q?.sourceRef || "").trim();
    const first = raw.split(" · ")[0]?.trim();
    return first || "Fuente no especificada";
  }

  function enabledSourcesSet() {
    const selected = Array.isArray(state.settings.enabledSources) ? state.settings.enabledSources : SOURCE_NAMES;
    return new Set(selected);
  }

  function sourceIsEnabled(sourceName) {
    return enabledSourcesSet().has(sourceName);
  }

  function filterByEnabledSources(questions) {
    if (!SOURCE_NAMES.length) return questions;
    const enabled = enabledSourcesSet();
    return questions.filter(q => enabled.has(questionSourceName(q)));
  }

  function sourceCounts() {
    const counts = Object.fromEntries(SOURCE_NAMES.map(source => [source, 0]));
    for (const q of QUESTIONS) {
      if (q.trusted === true && correctKeyValid(q)) {
        const source = questionSourceName(q);
        counts[source] = (counts[source] || 0) + 1;
      }
    }
    return counts;
  }

  function trustedPool() {
    return uniqueByQuestionText(filterByEnabledSources(QUESTIONS).filter(q => q.trusted === true && correctKeyValid(q)));
  }

  function poolForMode(mode) {
    const pool = trustedPool();
    const tema = MODE_TEMA[mode];
    if (tema == null) return pool;
    return pool.filter(q => q.tema === tema);
  }

  function shuffle(array) {
    const a = array.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function generateTest(mode) {
    const pool = poolForMode(mode);
    // Size is always capped to the pool, so it can never exceed what's available.
    const size = Math.min(effectiveQuestionCount(mode), pool.length);
    if (size < 1) {
      return {
        error: `No hay preguntas disponibles para ${MODE_LABELS[mode] || mode} con las fuentes activas.`
      };
    }
    const used = state.cycleUsed[mode] || new Set();
    state.cycleUsed[mode] = used;
    let available = pool.filter(q => !used.has(questionUniqueKey(q)));
    if (available.length < size) {
      used.clear();
      available = pool.slice();
    }
    const selected = shuffle(available).slice(0, size);
    for (const q of selected) used.add(questionUniqueKey(q));
    return { questions: selected };
  }

  function startNewTest(mode = state.selectedMode) {
    if (state.loading) return;
    state.selectedMode = mode;
    const generated = generateTest(mode);
    if (generated.error) {
      stopTimer();
      state.error = generated.error;
      state.currentTest = [];
      state.finished = false;
      render();
      return;
    }
    state.error = null;
    state.currentTest = generated.questions;
    resetRunState();
    startTimer();
    render();
  }

  function resetRunState() {
    state.currentIndex = 0;
    state.answered = false;
    state.selectedKey = null;
    state.score = 0;
    state.correct = 0;
    state.wrong = 0;
    state.answers = [];
    state.finished = false;
    state.elapsed = 0;
    state.startedAt = Date.now();
  }

  function answer(key) {
    if (state.error || state.finished || !state.currentTest.length) return;
    if (state.answered) {
      nextQuestion();
      return;
    }
    const q = state.currentTest[state.currentIndex];
    if (!q || !q.options.some(o => o.key === key)) return;
    const isCorrect = key === q.correctKey;
    state.answered = true;
    state.selectedKey = key;
    if (isCorrect) {
      state.score += 1;
      state.correct += 1;
    } else {
      state.wrong += 1;
    }
    state.answers[state.currentIndex] = {
      id: q.id,
      question: q.question,
      selectedKey: key,
      correctKey: q.correctKey,
      selectedText: optionText(q, key),
      correctText: optionText(q, q.correctKey),
      isCorrect
    };
    render();
  }

  function nextQuestion() {
    if (!state.answered) return;
    if (state.currentIndex >= currentTestSize() - 1) {
      finishTest();
      return;
    }
    state.currentIndex += 1;
    state.answered = false;
    state.selectedKey = null;
    render();
  }

  function finishTest() {
    stopTimer();
    state.finished = true;
    state.answered = false;
    state.selectedKey = null;
    updateBestScore();
    render();
  }

  function optionText(q, key) {
    const opt = q.options.find(o => o.key === key);
    return opt ? opt.text : "";
  }

  function percent() {
    return Math.round((state.score / currentTestSize()) * 100);
  }

  function gradeStats() {
    const total = currentTestSize();
    const penaltyEvery = normalizedPenaltyEvery();
    const net = state.correct - (state.wrong / penaltyEvery);
    const grade = Math.max(0, Math.min(10, (net / total) * 10));
    return { net, grade, penaltyEvery, total };
  }

  function formatGrade(value) {
    return Number(value).toFixed(1).replace(/\.0$/, "");
  }

  function penaltyLabel() {
    return `1 por cada ${normalizedPenaltyEvery()} correctas`;
  }

  function formatTime(seconds) {
    const s = Math.max(0, Math.floor(seconds));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const r = s % 60;
    const mm = String(m).padStart(2, "0");
    const ss = String(r).padStart(2, "0");
    return h ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
  }

  function startTimer() {
    stopTimer();
    state.startedAt = Date.now();
    state.elapsed = 0;
    state.timer = setInterval(() => {
      state.elapsed = Math.floor((Date.now() - state.startedAt) / 1000);
      document.querySelectorAll("[data-time-stat]").forEach((node) => {
        node.textContent = formatTime(state.elapsed);
      });
    }, 1000);
  }

  function stopTimer() {
    if (state.timer) clearInterval(state.timer);
    state.timer = null;
    if (state.startedAt && !state.finished) {
      state.elapsed = Math.floor((Date.now() - state.startedAt) / 1000);
    }
  }

  function loadBestScores() {
    const raw = readJSON(STORE_KEYS.best, {});
    return (raw && typeof raw === "object") ? raw : {};
  }

  function saveBestScores() {
    if (!storage) return;
    try {
      storage.setItem(STORE_KEYS.best, JSON.stringify(state.bestScores));
    } catch (_) {}
  }

  function subjectBest() {
    const key = CURRENT_SUBJECT || "default";
    if (!state.bestScores[key] || typeof state.bestScores[key] !== "object") state.bestScores[key] = {};
    return state.bestScores[key];
  }

  function updateBestScore() {
    const mode = state.selectedMode;
    const stats = gradeStats();
    const current = { grade: stats.grade, score: state.score, total: stats.total, time: state.elapsed, date: new Date().toISOString() };
    const best = subjectBest();
    const previous = best[mode];
    if (!previous || current.grade > previous.grade || (current.grade === previous.grade && current.time < previous.time)) {
      best[mode] = current;
      saveBestScores();
    }
  }

  function bestLabel(mode = state.selectedMode) {
    const best = subjectBest()[mode];
    if (!best) return "—";
    if (typeof best.grade === "number") return `${formatGrade(best.grade)}/10`;
    return best.score != null ? `${best.score}/${best.total || 40}` : "—";
  }

  // Malformed questions are skipped (they never enter the pool), so the bank
  // still loads. We only treat it as a hard error when nothing is usable.
  function validateData() {
    const problems = [];
    const usable = QUESTIONS.filter(q => q.trusted === true && correctKeyValid(q));
    const skipped = QUESTIONS.length - usable.length;
    if (skipped > 0) console.warn(`Quiz: ${skipped} pregunta(s) ignorada(s) por formato no válido.`);
    if (!QUESTIONS.length) {
      problems.push("El banco de preguntas está vacío.");
    } else if (!usable.length) {
      problems.push("Ninguna pregunta del banco tiene un formato válido (opciones y respuesta correcta).");
    }
    const counts = Object.fromEntries(MODES.map(mode => [mode.key, poolForMode(mode.key).length]));
    return { ok: problems.length === 0, problems, counts };
  }

  function renderSettingsButton() {
    return `
      <button class="settings-trigger" data-action="open-settings" type="button" aria-label="Opciones">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M19.43 12.98c.04-.32.07-.65.07-.98s-.02-.66-.07-.98l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.6-.22l-2.49 1a7.3 7.3 0 0 0-1.69-.98L14.5 2.42A.49.49 0 0 0 14 2h-4a.49.49 0 0 0-.5.42L9.12 5.07c-.61.24-1.18.56-1.69.98l-2.49-1a.5.5 0 0 0-.6.22l-2 3.46a.5.5 0 0 0 .12.64l2.11 1.65c-.05.32-.08.65-.08.98s.03.66.08.98l-2.11 1.65a.5.5 0 0 0-.12.64l2 3.46c.13.23.4.32.6.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.38-2.65c.61-.25 1.17-.58 1.69-.98l2.49 1c.2.1.47.01.6-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.11-1.65ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/></svg>
      </button>
    `;
  }


  function renderSourceSettings() {
    if (!SOURCE_NAMES.length) return "";
    const counts = sourceCounts();
    const totalActive = SOURCE_NAMES.filter(source => sourceIsEnabled(source)).length;
    return `
          <div class="settings-item source-settings">
            <div class="settings-label-row">
              <div class="settings-label">Fuentes de preguntas</div>
              <button class="mini-link" data-action="sources-all" type="button">Todas</button>
            </div>
            <div class="source-options" aria-label="Fuentes activas">
              ${SOURCE_NAMES.map(source => `
                <button class="source-choice ${sourceIsEnabled(source) ? "active" : ""}" data-source-toggle="${escapeHtml(source)}" type="button" aria-pressed="${sourceIsEnabled(source) ? "true" : "false"}">
                  <span class="source-check">✓</span>
                  <span class="source-name">${escapeHtml(source)}</span>
                  <span class="source-count">${counts[source] || 0}</span>
                </button>
              `).join("")}
            </div>
            <p class="settings-note">Activas: ${totalActive}/${SOURCE_NAMES.length}. Al cambiar una fuente se genera un nuevo test con el filtro aplicado.</p>
          </div>
    `;
  }

  function renderSettingsModal() {
    if (!state.settingsOpen) return "";
    return `
      <div class="settings-backdrop" data-action="close-settings"></div>
      <section class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <button class="modal-close" data-action="close-settings" type="button" aria-label="Cerrar opciones">×</button>
        <div>
          <h2 id="settingsTitle">Opciones</h2>
          <p>Ajustes del test, fuentes activas y cálculo de la nota final.</p>
        </div>
        <div class="settings-list">
          <div class="settings-item">
            <div class="settings-label">Nº de preguntas por test</div>
            <div class="stepper">
              <button class="step-btn" data-setting-step="questionCount" data-delta="-1" type="button" aria-label="Reducir preguntas">−</button>
              <input class="step-input" data-setting-input="questionCount" type="text" value="${questionCountDisplay()}" autocomplete="off" aria-label="Número de preguntas por test">
              <button class="step-btn" data-setting-step="questionCount" data-delta="1" type="button" aria-label="Aumentar preguntas">+</button>
            </div>
            <p class="settings-note">El máximo es el nº de preguntas disponibles en el test actual (${poolSizeForMode(state.selectedMode)}). Elige MAX para usar todas; se ajusta solo al cambiar de test o de asignatura.</p>
          </div>
          <div class="settings-item">
            <div class="settings-label">Penalización por pregunta incorrecta</div>
            <div class="stepper">
              <button class="step-btn" data-setting-step="penaltyEvery" data-delta="-1" type="button" aria-label="Aumentar penalización">−</button>
              <div class="step-value">${penaltyLabel()}</div>
              <button class="step-btn" data-setting-step="penaltyEvery" data-delta="1" type="button" aria-label="Reducir penalización">+</button>
            </div>
            <p class="settings-note">Fórmula: nota = correctas − incorrectas / ${normalizedPenaltyEvery()}, normalizada sobre 10.</p>
          </div>
          ${renderSourceSettings()}
        </div>
      </section>
    `;
  }

  function renderLoading() {
    return `
      <main class="view">
        <section class="frame loading-frame" aria-label="Cargando banco de preguntas">
          <div class="loader" aria-hidden="true"></div>
          <h1>Cargando preguntas</h1>
          <p class="tiny-note">Leyendo ${escapeHtml(BANK_URL)}</p>
        </section>
      </main>
    `;
  }

  function renderStats() {
    const total = currentTestSize();
    const qNum = state.finished ? total : Math.min(state.currentIndex + 1, total);
    return `
      <div class="progress-row" aria-live="polite">
        <div class="stat-chip"><span class="stat-label">Pregunta</span><span class="stat-value">${qNum}/${total}</span></div>
        <div class="stat-chip"><span class="stat-label">Correctas</span><span class="stat-value">${state.correct}</span></div>
        <div class="stat-chip"><span class="stat-label">Incorrectas</span><span class="stat-value">${state.wrong}</span></div>
        <div class="stat-chip"><span class="stat-label">Tiempo</span><span class="stat-value" data-time-stat>${formatTime(state.elapsed)}</span></div>
        <div class="stat-chip"><span class="stat-label">Mejor</span><span class="stat-value">${bestLabel()}</span></div>
      </div>
    `;
  }

  function renderSubjectSwitch() {
    if (!Array.isArray(SUBJECTS) || SUBJECTS.length < 2) return "";
    return `
      <div class="subject-switch-label">Selección de asignatura</div>
      <div class="subject-switch" role="tablist" aria-label="Asignatura">
        ${SUBJECTS.map(subject => `
          <button class="subject-chip ${subject.key === CURRENT_SUBJECT ? "active" : ""}" data-subject="${escapeHtml(subject.key)}" type="button" role="tab" aria-selected="${subject.key === CURRENT_SUBJECT ? "true" : "false"}">
            ${subject.icon ? `<span class="subject-emoji" aria-hidden="true">${escapeHtml(subject.icon)}</span>` : ""}
            <span class="subject-name">${escapeHtml(subject.label || subject.key)}</span>
          </button>
        `).join("")}
      </div>
    `;
  }

  function renderModeButtons() {
    return `
      <div class="selector-stack">
        ${renderSubjectSwitch()}
        <div class="mode-selector" role="tablist" aria-label="Modo de test">
          ${MODES.map(mode => `
            <button class="mode-btn ${state.selectedMode === mode.key ? "active" : ""}" data-mode="${mode.key}" type="button">${escapeHtml(mode.label)}</button>
          `).join("")}
        </div>
      </div>
    `;
  }

  function questionLengthClass(q) {
    const len = String(q?.question || "").length;
    if (len > 245) return " q-very-long";
    if (len > 155) return " q-long";
    return "";
  }

  function sourceLabel(q) {
    return q.sourceRef || "Fuente no especificada";
  }

  function renderQuiz() {
    const q = state.currentTest[state.currentIndex];
    if (!q) return renderError("No hay pregunta activa.");
    const answered = state.answered;
    const options = q.options.map(opt => {
      let cls = "answer";
      if (answered) {
        if (opt.key === q.correctKey) cls += " correct";
        else if (opt.key === state.selectedKey) cls += " wrong";
        else cls += " dim";
      }
      return `
        <button class="${cls}" data-answer="${opt.key}" type="button" aria-label="Respuesta ${opt.key}">
          <span class="answer-inner">
            <span class="answer-key">${opt.key}</span>
            <span class="answer-text">${escapeHtml(opt.text)}</span>
          </span>
        </button>
      `;
    }).join("");

    const selectedOk = answered && state.selectedKey === q.correctKey;
    const correctAnswerText = `${q.correctKey}) ${escapeHtml(optionText(q, q.correctKey))}`;
    const feedbackHtml = answered
      ? selectedOk
        ? `<div class="feedback result-feedback is-correct" role="status"><strong>Correcta.</strong>&nbsp;${correctAnswerText}</div>`
        : `<div class="feedback result-feedback is-wrong" role="status"><strong>Incorrecta.</strong>&nbsp;La correcta es ${correctAnswerText}</div>`
      : "";

    return `
      <main class="view">
        <section class="frame quiz-frame" aria-label="Test de entrenamiento">
          <div class="question-card ${answered ? "ready-next" : ""}${questionLengthClass(q)}" data-question-card="true">
            <span class="source-badge" data-source-icon tabindex="0" title="${escapeHtml(sourceLabel(q))}" aria-label="Fuente: ${escapeHtml(sourceLabel(q))}">
              ?
              <span class="source-tooltip">${escapeHtml(sourceLabel(q))}</span>
            </span>
            <span class="question-text">${escapeHtml(q.question)}</span>
          </div>
          <div class="answers" data-count="${q.options.length}">${options}</div>
          ${feedbackHtml}
          ${renderStats()}
          <div class="actions-row">
            <button class="btn btn-primary" data-action="new" type="button">Nuevo test</button>
          </div>
          ${renderModeButtons()}
        </section>
      </main>
    `;
  }

  function renderResult() {
    const missed = state.answers.filter(a => !a.isCorrect);
    const missedHtml = missed.length ? missed.map((m, i) => `
      <article class="miss">
        <p><strong>${i + 1}.</strong> ${escapeHtml(m.question)}</p>
        <small>Tu respuesta: ${m.selectedKey}) ${escapeHtml(m.selectedText)}</small>
        <small>Respuesta correcta: ${m.correctKey}) ${escapeHtml(m.correctText)}</small>
      </article>
    `).join("") : `<article class="miss"><p>Sin errores en este test.</p></article>`;
    const stats = gradeStats();
    const total = currentTestSize();

    return `
      <main class="view">
        <section class="frame result-frame" aria-label="Resultados finales">
          <div class="result-hero">
            <span class="result-kicker">Test completado</span>
            <div class="grade-score"><span class="grade-prefix">Tu nota es:</span><strong>${formatGrade(stats.grade)}</strong><span class="grade-denom">/10</span></div>
            <p class="result-subtitle"><strong>${state.score} / ${total}</strong> · ${escapeHtml(MODE_LABELS[state.selectedMode] || state.selectedMode)} · ${percent()}% de aciertos · ${formatTime(state.elapsed)}</p>
            <p class="penalty-line">Penalización aplicada: ${penaltyLabel()}</p>
          </div>
          ${renderStats()}
          <div class="actions-row">
            <button class="btn btn-primary" data-action="new" type="button">Nuevo test</button>
          </div>
          ${renderModeButtons()}
          <section class="review-block">
            <h2>Preguntas falladas</h2>
            ${missedHtml}
          </section>
        </section>
      </main>
    `;
  }

  function renderError(message) {
    const details = String(message || state.error || "Error de validación");
    return `
      <main class="view">
        <section class="frame error-card">
          <h1>No se puede iniciar el test</h1>
          <div class="feedback is-wrong">${escapeHtml(details)}</div>
          <div class="actions-row">
            <button class="btn btn-primary" data-action="new" type="button">Reintentar</button>
          </div>
          ${renderModeButtons()}
        </section>
      </main>
    `;
  }

  function render() {
    const app = document.getElementById("app");
    if (!app) return;
    let body;
    if (state.loading) body = renderLoading();
    else if (state.error) body = renderError(state.error);
    else if (state.finished) body = renderResult();
    else body = renderQuiz();
    app.innerHTML = renderSettingsButton() + body + renderSettingsModal();
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function changeSetting(name, delta) {
    if (name === "questionCount") {
      // MAX is the top rung of the stepper. Stepping up into (or past) the pool
      // size selects MAX; stepping down off MAX drops to (pool - 1).
      const pool = poolSizeForMode(state.selectedMode);
      const next = effectiveQuestionCount(state.selectedMode) + delta;
      if (pool > 0 && next >= pool) {
        state.settings.useMax = true;
      } else {
        state.settings.useMax = false;
        state.settings.questionCount = clampNumber(next, SETTING_LIMITS.questionCount.min, pool > 0 ? pool : SETTING_LIMITS.questionCount.max, DEFAULT_SETTINGS.questionCount);
      }
    }
    if (name === "penaltyEvery") {
      state.settings.penaltyEvery = clampNumber(normalizedPenaltyEvery() + delta, SETTING_LIMITS.penaltyEvery.min, SETTING_LIMITS.penaltyEvery.max, DEFAULT_SETTINGS.penaltyEvery);
    }
    saveSettings();
    render();
  }

  function setQuestionCountFromInput(value) {
    const pool = poolSizeForMode(state.selectedMode);
    const str = String(value).trim().toLowerCase();
    if (str === "max" || str === "máx" || str === "todas") {
      state.settings.useMax = true;
    } else {
      const n = clampNumber(value, SETTING_LIMITS.questionCount.min, SETTING_LIMITS.questionCount.max, DEFAULT_SETTINGS.questionCount);
      if (pool > 0 && n >= pool) {
        state.settings.useMax = true;
      } else {
        state.settings.useMax = false;
        state.settings.questionCount = n;
      }
    }
    saveSettings();
    render();
  }


  function resetCycles() {
    state.cycleUsed = Object.fromEntries(MODES.map(mode => [mode.key, new Set()]));
  }

  function applySourceFilterChange() {
    saveSettings();
    resetCycles();
    if (!state.loading) startNewTest(state.selectedMode);
    else render();
  }

  function toggleSource(sourceName) {
    if (!SOURCE_NAMES.includes(sourceName)) return;
    const enabled = enabledSourcesSet();
    if (enabled.has(sourceName)) enabled.delete(sourceName);
    else enabled.add(sourceName);
    state.settings.enabledSources = SOURCE_NAMES.filter(source => enabled.has(source));
    applySourceFilterChange();
  }

  function enableAllSources() {
    state.settings.enabledSources = SOURCE_NAMES.slice();
    applySourceFilterChange();
  }

  document.getElementById("app").addEventListener("click", (event) => {
    const settingsStep = event.target.closest("[data-setting-step]");
    if (settingsStep) {
      changeSetting(settingsStep.dataset.settingStep, Number(settingsStep.dataset.delta || 0));
      return;
    }
    const sourceToggle = event.target.closest("[data-source-toggle]");
    if (sourceToggle) {
      toggleSource(sourceToggle.dataset.sourceToggle);
      return;
    }
    const subjectButton = event.target.closest("[data-subject]");
    if (subjectButton) {
      switchSubject(subjectButton.dataset.subject);
      return;
    }
    const modeButton = event.target.closest("[data-mode]");
    if (modeButton) {
      startNewTest(modeButton.dataset.mode);
      return;
    }
    const answerButton = event.target.closest("[data-answer]");
    if (answerButton) {
      answer(answerButton.dataset.answer);
      return;
    }
    if (event.target.closest("[data-source-icon]")) {
      event.stopPropagation();
      return;
    }
    if (event.target.closest("[data-question-card]")) {
      if (state.answered) nextQuestion();
      return;
    }
    const action = event.target.closest("[data-action]");
    if (!action) return;
    switch (action.dataset.action) {
      case "new": startNewTest(state.selectedMode); break;
      case "sources-all": enableAllSources(); break;
      case "open-settings": state.settingsOpen = true; render(); break;
      case "close-settings": state.settingsOpen = false; render(); break;
    }
  });

  document.getElementById("app").addEventListener("change", (event) => {
    const input = event.target.closest("[data-setting-input='questionCount']");
    if (input) setQuestionCountFromInput(input.value);
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape" && state.settingsOpen) {
      state.settingsOpen = false;
      render();
    }
  });

  init();

  </script>
</body>
</html>
